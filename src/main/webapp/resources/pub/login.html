<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 페이지 (퍼블 샘플)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        input [type="text"], input [type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff4500;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔒 KT EDU 로그인</h2>
    <input type="text" placeholder="아이디를 입력하세요">
    <input type="password" placeholder="비밀번호를 입력하세요">
    <button type="button">로그인</button>
</div>
</body>
</html>
