name: Java CI/CD Pipeline (KT-LMS Portal)

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 소스코드 다운로드
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # JDK 21 환경 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # [개발 브랜치 분기] dev 브랜치일 때만 작동
      - name: Copy Dev Properties for Maven Build
        if: github.ref == 'refs/heads/dev'
        run: |
          cp src/main/resources/conf/properties/application-dev.properties.sample src/main/resources/conf/properties/application-dev.properties

      # [운영 브랜치 분기] main 브랜치일 때만 작동
      - name: Copy Prod Properties for Maven Build
        if: github.ref == 'refs/heads/main'
        run: |
          cp src/main/resources/conf/properties/application-prod.properties.sample src/main/resources/conf/properties/application-prod.properties

      # 컴파일 및 메이븐 빌드 수행
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # [개발용 산출물 저장] dev 브랜치 전용 아티팩트
      - name: Upload Dev Build Artifact
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: ktlms-portal-dev-war
          path: target/*.war
          retention-days: 3

      # [운영용 산출물 저장] main 브랜치 전용 아티팩트
      - name: Upload Prod Build Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ktlms-portal-war
          path: target/*.war
          retention-days: 7